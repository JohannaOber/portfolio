<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0ece6"/>
      <stop offset="100%" stop-color="#ddd5cc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#00000033"/>
    </filter>
    <clipPath id="screen-clip">
      <rect x="338" y="96" width="124" height="268" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- iPhone group with slight -5deg rotation -->
  <g transform="rotate(-5, 400, 250)" filter="url(#shadow)">

    <!-- Outer frame -->
    <rect x="326" y="72" width="148" height="356" rx="28" fill="#1c1c1e"/>

    <!-- Side button highlights -->
    <rect x="322" y="148" width="5" height="36" rx="2" fill="#2c2c2e"/>
    <rect x="322" y="192" width="5" height="56" rx="2" fill="#2c2c2e"/>
    <rect x="473" y="160" width="5" height="48" rx="2" fill="#2c2c2e"/>

    <!-- Screen area -->
    <rect x="336" y="84" width="128" height="332" rx="20" fill="#ffffff"/>

    <!-- Dynamic Island -->
    <rect x="376" y="96" width="48" height="14" rx="7" fill="#1c1c1e"/>

    <!-- Screen content (clipped) -->
    <g clip-path="url(#screen-clip)">
      <!-- Status bar -->
      <rect x="338" y="96" width="124" height="20" fill="#ffffff"/>
      <text x="352" y="108" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" fill="#1c1c1e" font-weight="600">9:41</text>
      <text x="436" y="108" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" fill="#1c1c1e" text-anchor="end">●●●</text>

      <!-- Header -->
      <rect x="338" y="116" width="124" height="24" fill="#ffffff"/>
      <text x="400" y="132" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#1c1c1e" font-weight="700" text-anchor="middle">Checkout</text>

      <!-- Divider -->
      <line x1="338" y1="140" x2="462" y2="140" stroke="#eeeeee" stroke-width="1"/>

      <!-- Product item -->
      <rect x="346" y="148" width="40" height="40" rx="6" fill="#f0ece6"/>
      <!-- Product image placeholder - abstract shape -->
      <circle cx="366" cy="168" r="14" fill="#e0d8d0"/>
      <circle cx="366" cy="168" r="8" fill="#c8beb4"/>

      <text x="394" y="160" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#1c1c1e" font-weight="600">Bloom Candle</text>
      <text x="394" y="172" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" fill="#888888">Vanilla &amp; Amber</text>
      <text x="394" y="184" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#1c1c1e" font-weight="600">€49.00</text>

      <!-- Divider -->
      <line x1="346" y1="198" x2="454" y2="198" stroke="#eeeeee" stroke-width="1"/>

      <!-- Order summary -->
      <text x="346" y="212" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#1c1c1e" font-weight="700">Order Summary</text>

      <text x="346" y="226" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7.5" fill="#555555">Subtotal</text>
      <text x="454" y="226" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7.5" fill="#1c1c1e" text-anchor="end">€49.00</text>

      <text x="346" y="239" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7.5" fill="#555555">Shipping</text>
      <text x="454" y="239" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7.5" fill="#4caf50" text-anchor="end">Free</text>

      <text x="346" y="252" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7.5" fill="#555555">Tax</text>
      <text x="454" y="252" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7.5" fill="#1c1c1e" text-anchor="end">€9.31</text>

      <line x1="346" y1="258" x2="454" y2="258" stroke="#eeeeee" stroke-width="1"/>

      <text x="346" y="270" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8.5" fill="#1c1c1e" font-weight="700">Total</text>
      <text x="454" y="270" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8.5" fill="#1c1c1e" font-weight="700" text-anchor="end">€58.31</text>

      <!-- Shipping address preview -->
      <rect x="346" y="278" width="108" height="28" rx="6" fill="#f7f5f2"/>
      <text x="354" y="290" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" fill="#888888">Ship to</text>
      <text x="354" y="301" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" fill="#1c1c1e">Johanna Ober · Munich, DE</text>

      <!-- CTA Button -->
      <rect x="346" y="314" width="108" height="32" rx="10" fill="#1c1c1e"/>
      <text x="400" y="334" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#ffffff" font-weight="600" text-anchor="middle">Place Order</text>

      <!-- Bottom safe area indicator -->
      <rect x="370" y="354" width="60" height="4" rx="2" fill="#1c1c1e" opacity="0.2"/>
    </g>
  </g>
</svg>
