<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg-t" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a1020"/>
    </linearGradient>
    <filter id="shadow-t" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0000005a"/>
    </filter>
    <clipPath id="screen-clip-t">
      <rect x="336" y="94" width="128" height="312" rx="4"/>
    </clipPath>
    <!-- Album art gradient colors -->
    <linearGradient id="alb1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="alb2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <!-- Glow filter for screen -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg-t)"/>

  <!-- Background ambient glow from screen -->
  <ellipse cx="400" cy="260" rx="140" ry="180" fill="#7c3aed" opacity="0.08" filter="url(#glow)"/>

  <!-- iPhone group with slight 4deg tilt -->
  <g transform="rotate(4, 400, 250)" filter="url(#shadow-t)">

    <!-- Outer frame -->
    <rect x="324" y="70" width="152" height="360" rx="30" fill="#1c1c1e"/>

    <!-- Side buttons -->
    <rect x="320" y="148" width="5" height="38" rx="2" fill="#2c2c2e"/>
    <rect x="320" y="194" width="5" height="58" rx="2" fill="#2c2c2e"/>
    <rect x="475" y="162" width="5" height="50" rx="2" fill="#2c2c2e"/>

    <!-- Screen -->
    <rect x="334" y="82" width="132" height="336" rx="22" fill="#111111"/>

    <!-- Dynamic Island -->
    <rect x="374" y="94" width="52" height="16" rx="8" fill="#000000"/>

    <!-- Screen content clipped -->
    <g clip-path="url(#screen-clip-t)">

      <!-- Background gradient overlay -->
      <rect x="336" y="94" width="128" height="312" fill="#111111"/>
      <rect x="336" y="94" width="128" height="160" fill="#1a0a2e" opacity="0.8"/>

      <!-- Status bar -->
      <text x="348" y="106" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" fill="#ffffff" font-weight="600">9:41</text>
      <text x="452" y="106" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" fill="#ffffff" text-anchor="end">●●●</text>

      <!-- Mini header -->
      <text x="400" y="122" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#a0a0b0" text-anchor="middle">Now Playing</text>

      <!-- Album art — abstract multi-color squares -->
      <rect x="348" y="130" width="104" height="104" rx="10" fill="#0d0d1a"/>
      <!-- Abstract squares in album art -->
      <rect x="348" y="130" width="52" height="52" rx="0" fill="url(#alb1)"/>
      <rect x="400" y="130" width="52" height="52" rx="0" fill="#1e1b4b"/>
      <rect x="348" y="182" width="52" height="52" rx="0" fill="#0f172a"/>
      <rect x="400" y="182" width="52" height="52" rx="0" fill="url(#alb2)"/>
      <!-- Overlay squares for depth -->
      <rect x="364" y="146" width="72" height="72" rx="8" fill="#ffffff" opacity="0.04"/>
      <rect x="372" y="154" width="56" height="56" rx="6" fill="#7c3aed" opacity="0.3"/>
      <rect x="382" y="164" width="36" height="36" rx="4" fill="#ec4899" opacity="0.4"/>
      <!-- Top-right corner rounded for art -->
      <rect x="400" y="130" width="52" height="52" rx="10" fill="transparent" stroke="#111111" stroke-width="2"/>
      <!-- Bottom-left corner -->
      <rect x="348" y="182" width="52" height="52" rx="10" fill="transparent" stroke="#111111" stroke-width="2"/>

      <!-- Song title and artist -->
      <text x="354" y="248" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#ffffff" font-weight="700">Neon Drift</text>
      <text x="354" y="262" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8.5" fill="#a0a0b0">Synthwave Collective</text>

      <!-- Heart icon area -->
      <text x="450" y="252" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#ec4899" text-anchor="end">♥</text>

      <!-- Progress bar -->
      <rect x="354" y="272" width="92" height="3" rx="1.5" fill="#3a3a4a"/>
      <rect x="354" y="272" width="48" height="3" rx="1.5" fill="#0000ff"/>
      <!-- Progress dot -->
      <circle cx="402" cy="273.5" r="5" fill="#0000ff"/>

      <!-- Time labels -->
      <text x="354" y="284" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" fill="#6b7280">1:52</text>
      <text x="446" y="284" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" fill="#6b7280" text-anchor="end">3:41</text>

      <!-- Playback controls -->
      <!-- Shuffle -->
      <text x="354" y="308" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#6b7280">⇌</text>
      <!-- Previous -->
      <text x="374" y="308" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#ffffff">◀◀</text>
      <!-- Play button -->
      <circle cx="400" cy="302" r="16" fill="#ffffff"/>
      <text x="400" y="308" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#111111" text-anchor="middle">▶</text>
      <!-- Next -->
      <text x="418" y="308" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#ffffff">▶▶</text>
      <!-- Repeat -->
      <text x="440" y="308" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#6b7280">↻</text>

      <!-- Volume bar -->
      <text x="350" y="330" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#6b7280">🔈</text>
      <rect x="364" y="325" width="70" height="3" rx="1.5" fill="#3a3a4a"/>
      <rect x="364" y="325" width="50" height="3" rx="1.5" fill="#8b8b9a"/>
      <text x="440" y="330" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#6b7280">🔊</text>

      <!-- Bottom nav dots -->
      <circle cx="385" cy="348" r="3" fill="#6b7280"/>
      <circle cx="400" cy="348" r="3" fill="#ffffff"/>
      <circle cx="415" cy="348" r="3" fill="#6b7280"/>

      <!-- Home indicator -->
      <rect x="372" y="392" width="56" height="4" rx="2" fill="#ffffff" opacity="0.3"/>
    </g>
  </g>
</svg>
