<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="shadow-c" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#00000030"/>
    </filter>
    <clipPath id="screen-clip-c">
      <rect x="238" y="52" width="326" height="396" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f7f7f5"/>

  <!-- iPad group with 2deg CW rotation -->
  <g transform="rotate(2, 400, 250)" filter="url(#shadow-c)">

    <!-- Outer frame -->
    <rect x="226" y="36" width="350" height="428" rx="22" fill="#1c1c1e"/>

    <!-- Home indicator bar (thin) -->
    <rect x="374" y="452" width="54" height="5" rx="2.5" fill="#3a3a3c"/>

    <!-- Screen area -->
    <rect x="238" y="52" width="326" height="396" rx="8" fill="#ffffff"/>

    <!-- Front camera -->
    <circle cx="401" cy="44" r="4" fill="#2c2c2e"/>
    <circle cx="401" cy="44" r="2" fill="#1c1c1e"/>

    <!-- Screen content -->
    <g clip-path="url(#screen-clip-c)">

      <!-- Top navigation -->
      <rect x="238" y="52" width="326" height="52" fill="#ffffff"/>
      <!-- Logo area -->
      <rect x="252" y="66" width="8" height="8" rx="2" fill="#0ea5e9"/>
      <rect x="252" y="66" width="4" height="4" rx="1" fill="#38bdf8"/>
      <text x="265" y="76" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#0f172a" font-weight="700">CareFlow</text>
      <!-- Nav right items -->
      <circle cx="522" cy="72" r="16" fill="#f1f5f9"/>
      <text x="522" y="77" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">JO</text>
      <!-- Nav divider -->
      <line x1="238" y1="104" x2="564" y2="104" stroke="#f1f5f9" stroke-width="1"/>

      <!-- Page title and subtitle -->
      <text x="252" y="126" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#0f172a" font-weight="700">My Appointments</text>
      <text x="252" y="143" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#94a3b8">3 upcoming · Next: Tomorrow</text>

      <!-- Tab row -->
      <rect x="252" y="152" width="72" height="24" rx="12" fill="#0ea5e9"/>
      <text x="288" y="168" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#ffffff" font-weight="600" text-anchor="middle">Upcoming</text>
      <rect x="332" y="152" width="56" height="24" rx="12" fill="transparent"/>
      <text x="360" y="168" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Past</text>
      <rect x="396" y="152" width="70" height="24" rx="12" fill="transparent"/>
      <text x="431" y="168" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Documents</text>

      <!-- Appointment card 1 -->
      <rect x="252" y="186" width="298" height="68" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1.5"/>
      <!-- Left accent bar -->
      <rect x="252" y="186" width="4" height="68" rx="2" fill="#0ea5e9"/>
      <!-- Date block -->
      <rect x="266" y="198" width="40" height="44" rx="8" fill="#eff6ff"/>
      <text x="286" y="216" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#3b82f6" font-weight="600" text-anchor="middle">MAY</text>
      <text x="286" y="232" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#1e40af" font-weight="700" text-anchor="middle">14</text>
      <!-- Info -->
      <text x="316" y="210" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#0f172a" font-weight="600">Dr. Sarah Müller</text>
      <text x="316" y="225" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#64748b">General Practice · 10:30 AM</text>
      <!-- Status badge -->
      <rect x="316" y="232" width="58" height="16" rx="8" fill="#dcfce7"/>
      <text x="345" y="243" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8.5" fill="#16a34a" font-weight="600" text-anchor="middle">Confirmed</text>
      <!-- Arrow -->
      <text x="538" y="224" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>

      <!-- Appointment card 2 -->
      <rect x="252" y="264" width="298" height="68" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1.5"/>
      <rect x="252" y="264" width="4" height="68" rx="2" fill="#8b5cf6"/>
      <rect x="266" y="276" width="40" height="44" rx="8" fill="#f5f3ff"/>
      <text x="286" y="294" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#7c3aed" font-weight="600" text-anchor="middle">MAY</text>
      <text x="286" y="310" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#5b21b6" font-weight="700" text-anchor="middle">21</text>
      <text x="316" y="288" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#0f172a" font-weight="600">Dr. Klaus Werner</text>
      <text x="316" y="303" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#64748b">Cardiology · 2:00 PM</text>
      <rect x="316" y="310" width="70" height="16" rx="8" fill="#fef3c7"/>
      <text x="351" y="321" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8.5" fill="#d97706" font-weight="600" text-anchor="middle">Pending confirm</text>
      <text x="538" y="302" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>

      <!-- Appointment card 3 -->
      <rect x="252" y="342" width="298" height="68" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1.5"/>
      <rect x="252" y="342" width="4" height="68" rx="2" fill="#f59e0b"/>
      <rect x="266" y="354" width="40" height="44" rx="8" fill="#fffbeb"/>
      <text x="286" y="372" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#d97706" font-weight="600" text-anchor="middle">JUN</text>
      <text x="286" y="388" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#92400e" font-weight="700" text-anchor="middle">3</text>
      <text x="316" y="366" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#0f172a" font-weight="600">Dr. Anna Fischer</text>
      <text x="316" y="381" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#64748b">Dermatology · 9:15 AM</text>
      <rect x="316" y="388" width="58" height="16" rx="8" fill="#dcfce7"/>
      <text x="345" y="399" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8.5" fill="#16a34a" font-weight="600" text-anchor="middle">Confirmed</text>
      <text x="538" y="380" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>

      <!-- Action button -->
      <rect x="252" y="420" width="298" height="18" rx="9" fill="#0ea5e9"/>
      <text x="401" y="433" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#ffffff" font-weight="600" text-anchor="middle">+ Book New Appointment</text>

    </g>
  </g>
</svg>
